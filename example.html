<!DOCTYPE html>
<html>

<head>
  <title>Circle Design</title>

  <style>
    body {
      margin: 0;
      background: #6D1477;
    }

    #a {
      width: 120px;
      height: 120px;
      border-radius: 50%;

      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      background: #F5E3B5;

      /* Rings */
      box-shadow:
        0 0 0 35px #6D1477,
        0 0 0 65px #F5E3B5;
    }
  </style>
</head>

<body>

  <div id="a"></div>

</body>
</html>
