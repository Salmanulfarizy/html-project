<!DOCTYPE html>
<html>
<head>
    <title>Navbar</title>
    <style>
        .menu{
            margin: 55px;
            padding: 6px;

            gap: 5px;

            align-self: center;
    
        }
        .logo{
            color: brown;

        }
        .navbar{

            border-width: 5px;
            border-color: blue;
        }
        .menu{
        display: flex;
        }
    </style>
    
</head>

<body>

<div class="navbar">
